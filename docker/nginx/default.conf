server {
    listen 80;
    server_name localhost;

    # La racine du site = le dossier public/ de Symfony (et lui seul)
    root /var/www/public;

    # Autorise les uploads jusqu'à 16 Mo (cohérent avec la limite PHP)
    client_max_body_size 16M;

    location / {
        # Essaie de servir le fichier demandé, sinon passe la main à index.php
        try_files $uri /index.php$is_args$args;
    }

    # Les requêtes PHP sont envoyées au conteneur "php" (php-fpm)
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;
    }

    # Sécurité : on interdit l'exécution de tout autre fichier .php
    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}