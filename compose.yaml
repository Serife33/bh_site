services:

  # 1. La base de données — MySQL 8.4 LTS
  database:
    image: mysql:8.4
    container_name: bh_database
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bh_site
      MYSQL_USER: bh_user
      MYSQL_PASSWORD: bh_pass
    ports:
      - "3306:3306"
    volumes:
      - database_data:/var/lib/mysql

  # 2. PHP — c'est ici que ton code Symfony s'exécute
  php:
    build: ./docker/php
    container_name: bh_php
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - database

  # 3. Nginx — le serveur web (reçoit les requêtes du navigateur)
  nginx:
    image: nginx:alpine
    container_name: bh_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  # 4. phpMyAdmin — interface web pour voir/gérer la base
  phpmyadmin:
    image: phpmyadmin
    container_name: bh_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
    depends_on:
      - database

volumes:
  database_data: